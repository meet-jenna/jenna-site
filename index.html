<!doctype html>
<html lang="en">
  <head>
    
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jenna — The AI Hostess That Never Misses a Call</title>
    <meta
      name="description"
      content="Jenna answers your restaurant's phone, takes orders into your POS, books reservations, and handles payments — 24/7. Plugs into your existing line. Sounds completely human."
    />

    <!--
      Quicksand — rounded geometric sans, runtime font for the entire
      site. Weights: 500 (body/labels) + 700 (headlines + <em>). 400 + 600
      kept transitionally for any legacy weight reference until a full
      pass collapses everything to the 500/700 Shares-style two-weight
      system. Quicksand 300 is dropped (too thin at body sizes).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply saved theme before paint to avoid a flash of the wrong theme.
      // Light is the default; dark is opt-in via the toggle in the nav.
      (function () {
        try {
          var t = localStorage.getItem("jenna-theme");
          if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
