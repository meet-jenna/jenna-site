<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jenna — The AI Hostess That Never Misses a Call</title>
    <meta
      name="description"
      content="Jenna answers your restaurant's phone, takes orders into your POS, books reservations, and handles payments — 24/7. Plugs into your existing line. Sounds completely human."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply saved theme before paint to avoid a flash of the wrong theme.
      // Light is the default; dark is opt-in via toggle.
      (function () {
        try {
          var t = localStorage.getItem("jenna-theme");
          if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
