<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CallerCard Preview - Jenna AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "monospace"],
            },
            colors: {
              ink: "#1f1f23",
              paper: "#f7f7f9",
              chip: "#e5e5ea",
              soft: "#eeeef1",
              line: "#d9d9df",
              muted: "#6b6b73",
              slate: "#262626",
              coal: "#0b0b0b",
              accent: "#1c00ff",
            },
            boxShadow: {
              card: "0 1px 2px rgba(0,0,0,.04), 0 8px 30px rgba(0,0,0,.06)",
              soft: "0 1px 2px rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.04)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="font-sans text-ink antialiased">
    <main class="relative min-h-screen overflow-hidden px-5 py-12 sm:px-8">
      <div class="pointer-events-none absolute inset-x-0 -top-40 h-[720px] bg-gradient-to-b from-[#dbe6f7] via-[#eef2fa] to-paper"></div>
      <div class="pointer-events-none absolute -left-24 top-28 h-80 w-80 rounded-full bg-[#cfe0f5] opacity-70 blur-3xl"></div>
      <div class="pointer-events-none absolute right-[-6rem] top-6 h-80 w-80 rounded-full bg-[#e8d4f3] opacity-60 blur-3xl"></div>
      <div class="pointer-events-none absolute bottom-[-8rem] left-1/2 h-96 w-96 -translate-x-1/2 rounded-full bg-[#f5d6e8] opacity-35 blur-3xl"></div>

      <section class="relative z-10 mx-auto flex min-h-[calc(100vh-6rem)] max-w-4xl flex-col items-center justify-center text-center">
        <p class="text-[12px] font-semibold uppercase tracking-[0.18em] text-muted">Component preview</p>
        <h1 class="mt-3 text-[34px] font-semibold tracking-tight sm:text-[48px]">CallerCard</h1>
        <p class="mt-3 max-w-xl text-[15px] leading-relaxed text-muted">
          Light, floating caller cards for the Jenna hero intro. No animation or scatter positioning yet.
        </p>

        <div
          id="caller-card-preview"
          class="mt-12 flex max-w-3xl flex-wrap items-center justify-center gap-4 sm:gap-5"
          aria-label="Caller card samples"
        ></div>
      </section>
    </main>

    <script src="caller-card.js"></script>
    <script>
      const samples = [
        { avatarUrl: "https://i.pravatar.cc/64?img=1", quote: "Are you guys open on Sunday?" },
        { avatarUrl: "https://i.pravatar.cc/64?img=2", quote: "I want to book a table for 6" },
        { avatarUrl: "https://i.pravatar.cc/64?img=3", quote: "Do you deliver to 11743?" },
        { avatarUrl: "https://i.pravatar.cc/64?img=4", quote: "What's tonight's special?" },
        { avatarUrl: "https://i.pravatar.cc/64?img=5", quote: "Do you take walk-ins?" },
      ];

      const preview = document.getElementById("caller-card-preview");
      samples.forEach((sample) => {
        preview.append(window.CallerCard(sample));
      });
    </script>
  </body>
</html>
